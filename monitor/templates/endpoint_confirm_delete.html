{% extends "base.html" %}
{% block title %}Удалить эндпоинт{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="alert alert-danger">
      <h4 class="alert-heading">Удалить эндпоинт?</h4>
      <p>Вы уверены, что хотите удалить эндпоинт <strong>{{ endpoint.method }} {{ endpoint.path }}</strong>?</p>
      <p class="text-muted">Все связанные данные мониторинга будут удалены.</p>
    </div>
    
    <form method="post" class="mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Да, удалить</button>
      <a href="{% url 'project_detail' endpoint.project.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
