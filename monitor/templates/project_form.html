{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Новый проект{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Создать новый проект</h2>
    
    <form method="post" class="border p-4 rounded bg-light">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary w-100">Создать проект</button>
    </form>
    
    <a href="{% url 'dashboard' %}" class="btn btn-link mt-3">← Вернуться на панель</a>
  </div>
</div>
{% endblock %}
