version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: api_monitor_db
    environment:
      POSTGRES_DB: api_monitor_db
      POSTGRES_USER: api_monitor
      POSTGRES_PASSWORD: secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: api_monitor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Application
  web:
    build: .
    container_name: api_monitor_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      ALLOWED_HOSTS: "localhost,127.0.0.1,api_monitor"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "api_monitor_db"
      DB_USER: "api_monitor"
      DB_PASSWORD: "secure_password_123"
      DB_HOST: "db"
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      REDIS_URL: "redis://redis:6379/1"
      EMAIL_HOST: "smtp.gmail.com"
      EMAIL_PORT: "587"
      EMAIL_HOST_USER: "your-email@gmail.com"
      EMAIL_HOST_PASSWORD: "your-app-password"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build: .
    container_name: api_monitor_celery
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "api_monitor_db"
      DB_USER: "api_monitor"
      DB_PASSWORD: "secure_password_123"
      DB_HOST: "db"
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
      - web

  # Celery Beat Scheduler
  celery-beat:
    build: .
    container_name: api_monitor_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "api_monitor_db"
      DB_USER: "api_monitor"
      DB_PASSWORD: "secure_password_123"
      DB_HOST: "db"
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
      - celery

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: api_monitor_network
